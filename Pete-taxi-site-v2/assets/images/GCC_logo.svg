  <!-- Council name text -->
  <text x="60" y="22" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1a5c38" letter-spacing="0.5">Gloucester City</text>
  <text x="60" y="40" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1a5c38" letter-spacing="0.5">Council</text>
