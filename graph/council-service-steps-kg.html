<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Council Service Steps</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    font-size: 14px;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
  }

  header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #e0ddd8;
    background: #fff;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 { font-size: 16px; font-weight: 600; }

  .toggle-group {
    display: flex;
    gap: 0;
    border: 1px solid #d0cdc8;
    border-radius: 6px;
    overflow: hidden;
    margin-left: auto;
  }

  .toggle-group button {
    padding: 6px 14px;
    border: none;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    color: #555;
    transition: background 0.15s, color 0.15s;
  }

  .toggle-group button:not(:last-child) { border-right: 1px solid #d0cdc8; }
  .toggle-group button.active { background: #1a1a1a; color: #fff; }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 57px);
  }

  .sidebar {
    background: #fff;
    border-right: 1px solid #e0ddd8;
    overflow-y: auto;
    padding: 12px 0;
  }

  .sidebar-section { margin-bottom: 4px; }

  .sidebar-section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #888;
    padding: 8px 16px 4px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s;
    user-select: none;
  }

  .sidebar-item:hover { background: #f5f5f3; }

  .sidebar-item.active {
    background: #f0eeea;
    border-left-color: #1a1a1a;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot.step { background: #3b5bdb; }
  .dot.tech { background: #e67700; }

  .main {
    overflow-y: auto;
    padding: 24px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #999;
    gap: 8px;
  }

  .empty-state p { font-size: 14px; }

  .detail-header {
    margin-bottom: 20px;
  }

  .detail-type {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .detail-type.step { color: #3b5bdb; }
  .detail-type.tech { color: #e67700; }

  .detail-header h2 { font-size: 22px; font-weight: 600; line-height: 1.2; }

  .detail-description {
    margin-top: 8px;
    color: #555;
    line-height: 1.6;
    max-width: 560px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 10px;
    margin-top: 24px;
  }

  .chip-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity 0.1s, transform 0.1s;
  }

  .chip:hover { opacity: 0.8; transform: translateY(-1px); }

  .chip.step {
    background: #eef1ff;
    color: #2a3fa0;
    border-color: #c5cdf5;
  }

  .chip.tech {
    background: #fff3e0;
    color: #994400;
    border-color: #ffd8a8;
  }

  .stat-row {
    display: flex;
    gap: 16px;
    margin-top: 24px;
  }

  .stat {
    background: #f5f5f3;
    border-radius: 8px;
    padding: 12px 16px;
    min-width: 80px;
  }

  .stat-number { font-size: 24px; font-weight: 600; line-height: 1; }
  .stat-label { font-size: 12px; color: #777; margin-top: 4px; }
  .stat-number.step-color { color: #3b5bdb; }
  .stat-number.tech-color { color: #e67700; }

  .error {
    padding: 20px;
    color: #c00;
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <h1>Council Service Steps</h1>
  <div class="toggle-group">
    <button id="btn-steps" class="active" onclick="setFocus('steps')">Steps</button>
    <button id="btn-tech" onclick="setFocus('tech')">Tech components</button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div class="empty-state">
      <p>Select an item from the list to explore its connections.</p>
    </div>
  </main>
</div>

<script>
let graph = null;
let focus = 'steps';
let selected = null;

async function load() {
  try {
    const res = await fetch('council-service-steps-kg.json');
    if (!res.ok) throw new Error(res.statusText);
    graph = await res.json();
    render();
  } catch(e) {
    document.getElementById('sidebar').innerHTML = '';
    document.getElementById('main').innerHTML = `<div class="error">Could not load council-service-steps-kg.json: ${e.message}</div>`;
  }
}

function setFocus(f) {
  focus = f;
  selected = null;
  document.getElementById('btn-steps').classList.toggle('active', f === 'steps');
  document.getElementById('btn-tech').classList.toggle('active', f === 'tech');
  render();
}

function render() {
  renderSidebar();
  renderMain();
}

function renderSidebar() {
  const type = focus === 'steps' ? 'step' : 'tech_component';
  const nodes = graph.nodes.filter(n => n.type === type);
  const sidebar = document.getElementById('sidebar');
  const label = focus === 'steps' ? 'Service steps' : 'Tech components';
  const dotClass = focus === 'steps' ? 'step' : 'tech';

  sidebar.innerHTML = `<div class="sidebar-section">
    <div class="sidebar-section-label">${label}</div>
    ${nodes.map(n => `
      <div class="sidebar-item ${selected === n.id ? 'active' : ''}" onclick="select('${n.id}')">
        <span class="dot ${dotClass}"></span>
        <span>${n.label}</span>
      </div>
    `).join('')}
  </div>`;
}

function select(id) {
  selected = id;
  renderSidebar();
  renderMain();
}

function renderMain() {
  const main = document.getElementById('main');

  if (!selected) {
    main.innerHTML = `<div class="empty-state"><p>Select an item from the list to explore its connections.</p></div>`;
    return;
  }

  const node = graph.nodes.find(n => n.id === selected);
  const isStep = node.type === 'step';
  const isTech = node.type === 'tech_component';

  // Find connected nodes via edges
  const connectedIds = new Set();
  graph.edges.forEach(e => {
    if (isStep && e.source === selected) connectedIds.add(e.target);
    if (isTech && e.target === selected) connectedIds.add(e.source);
  });

  const connected = graph.nodes.filter(n => connectedIds.has(n.id));

  // For steps: connected nodes are tech components
  // For tech: connected nodes are steps
  const connectedType = isStep ? 'tech' : 'step';
  const connectedLabel = isStep ? 'Tech components required' : 'Steps that use this';

  // Also find peer nodes (steps sharing tech, or techs sharing steps)
  const peerIds = new Set();
  if (isStep) {
    // Other steps that share at least one tech component with this step
    graph.nodes.filter(n => n.type === 'step' && n.id !== selected).forEach(otherStep => {
      const otherTechs = new Set(graph.edges.filter(e => e.source === otherStep.id).map(e => e.target));
      const hasShard = [...connectedIds].some(t => otherTechs.has(t));
      if (hasShard) peerIds.add(otherStep.id);
    });
  } else {
    // Other tech components used by the same steps
    graph.nodes.filter(n => n.type === 'tech_component' && n.id !== selected).forEach(otherTech => {
      const otherSteps = new Set(graph.edges.filter(e => e.target === otherTech.id).map(e => e.source));
      const hasShared = [...connectedIds].some(s => otherSteps.has(s));
      if (hasShared) peerIds.add(otherTech.id);
    });
  }

  const peers = graph.nodes.filter(n => peerIds.has(n.id));
  const peerLabel = isStep ? 'Steps sharing at least one tech component' : 'Other components used by the same steps';

  const typeLabel = isStep ? 'Step' : 'Tech component';
  const typeClass = isStep ? 'step' : 'tech';

  main.innerHTML = `
    <div class="detail-header">
      <div class="detail-type ${typeClass}">${typeLabel}</div>
      <h2>${node.label}</h2>
      ${node.description ? `<p class="detail-description">${node.description}</p>` : ''}
    </div>

    <div class="stat-row">
      <div class="stat">
        <div class="stat-number ${typeClass === 'step' ? 'tech-color' : 'step-color'}">${connected.length}</div>
        <div class="stat-label">${isStep ? 'Tech components' : 'Steps'}</div>
      </div>
      <div class="stat">
        <div class="stat-number">${peers.length}</div>
        <div class="stat-label">${isStep ? 'Related steps' : 'Related components'}</div>
      </div>
    </div>

    <div class="section-label" style="margin-top:28px">${connectedLabel}</div>
    <div class="chip-grid">
      ${connected.map(n => `
        <div class="chip ${connectedType}" onclick="select('${n.id}')">
          ${n.label}
        </div>
      `).join('')}
    </div>

    ${peers.length ? `
      <div class="section-label">${peerLabel}</div>
      <div class="chip-grid">
        ${peers.map(n => `
          <div class="chip ${isStep ? 'step' : 'tech'}" onclick="select('${n.id}')">
            ${n.label}
          </div>
        `).join('')}
      </div>
    ` : ''}
  `;
}

load();
</script>
</body>
</html>
