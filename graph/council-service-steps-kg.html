<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Council Service Architecture</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; font-size: 14px; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  header { padding: 14px 20px; border-bottom: 1px solid #e0ddd8; background: #fff; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 15px; font-weight: 600; margin-right: auto; }
  .layer-tabs { display: flex; border: 1px solid #d0cdc8; border-radius: 6px; overflow: hidden; }
  .layer-tabs button { padding: 6px 14px; border: none; background: #fff; cursor: pointer; font-size: 13px; color: #555; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .layer-tabs button:not(:last-child) { border-right: 1px solid #d0cdc8; }
  .layer-tabs button.active { color: #fff; }
  .layer-tabs button[data-layer="service"].active  { background: #5c3fbe; }
  .layer-tabs button[data-layer="pattern"].active  { background: #0f7b6c; }
  .layer-tabs button[data-layer="step"].active     { background: #1d4ed8; }
  .layer-tabs button[data-layer="component"].active { background: #b45309; }
  .pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pip.service   { background: #5c3fbe; }
  .pip.pattern   { background: #0f7b6c; }
  .pip.step      { background: #1d4ed8; }
  .pip.component { background: #b45309; }
  .layout { display: grid; grid-template-columns: 240px 1fr; height: calc(100vh - 53px); }
  .sidebar { background: #fff; border-right: 1px solid #e0ddd8; overflow-y: auto; padding: 8px 0; }
  .sidebar-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #999; padding: 10px 16px 4px; }
  .sidebar-item { display: flex; align-items: center; gap: 8px; padding: 7px 16px; cursor: pointer; border-left: 3px solid transparent; }
  .sidebar-item:hover { background: #f5f5f3; }
  .sidebar-item.active { background: #f0eeea; }
  .sidebar-item.active.service   { border-left-color: #5c3fbe; }
  .sidebar-item.active.pattern   { border-left-color: #0f7b6c; }
  .sidebar-item.active.step      { border-left-color: #1d4ed8; }
  .sidebar-item.active.component { border-left-color: #b45309; }
  .main { overflow-y: auto; padding: 24px; }
  .empty-state { height: 100%; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 13px; }
  .detail-type { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .detail-type.service   { color: #5c3fbe; }
  .detail-type.pattern   { color: #0f7b6c; }
  .detail-type.step      { color: #1d4ed8; }
  .detail-type.component { color: #b45309; }
  h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .description { color: #555; line-height: 1.6; max-width: 560px; margin-bottom: 20px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #999; margin: 20px 0 8px; }
  .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid transparent; transition: opacity 0.1s, transform 0.1s; }
  .chip:hover { opacity: 0.75; transform: translateY(-1px); }
  .chip.service   { background: #ede9fc; color: #3b1fa0; border-color: #c4b8f0; }
  .chip.pattern   { background: #d1faf3; color: #0a4f43; border-color: #7de8d4; }
  .chip.step      { background: #dbeafe; color: #1e3a8a; border-color: #93c5fd; }
  .chip.component { background: #fef3c7; color: #78350f; border-color: #fcd34d; }
  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
  .stat { background: #f5f5f3; border-radius: 8px; padding: 10px 16px; }
  .stat-n { font-size: 22px; font-weight: 600; }
  .stat-n.service   { color: #5c3fbe; }
  .stat-n.pattern   { color: #0f7b6c; }
  .stat-n.step      { color: #1d4ed8; }
  .stat-n.component { color: #b45309; }
  .stat-lbl { font-size: 11px; color: #888; margin-top: 2px; }
</style>
</head>
<body>

<header>
  <h1>Council Service Architecture</h1>
  <div class="layer-tabs">
    <button data-layer="service"   onclick="setLayer('service')"  ><span class="pip service"></span>Services</button>
    <button data-layer="pattern"   onclick="setLayer('pattern')"  ><span class="pip pattern"></span>Patterns</button>
    <button data-layer="step"      onclick="setLayer('step')"     ><span class="pip step"></span>Steps</button>
    <button data-layer="component" onclick="setLayer('component')"><span class="pip component"></span>Components</button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"><div class="empty-state">Select an item to explore its connections.</div></main>
</div>

<script>
let graph = null;
let layer = 'service';
let selected = null;

const LABELS = { service: 'Services', pattern: 'Patterns', step: 'Steps', component: 'Components' };
const SINGULAR = { service: 'Service', pattern: 'Pattern', step: 'Step', component: 'Component' };

async function load() {
  try {
    const res = await fetch('council-service-steps-kg.json');
    if (!res.ok) throw new Error(res.statusText);
    graph = await res.json();
    setLayer('service');
  } catch(e) {
    document.getElementById('main').innerHTML = '<div style="padding:20px;color:#c00">Could not load JSON: ' + e.message + '</div>';
  }
}

function setLayer(l) {
  layer = l;
  selected = null;
  document.querySelectorAll('.layer-tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.layer === l);
  });
  if (graph) { renderSidebar(); renderMain(); }
}

// Navigate to a node — switches layer to match the node type
function navigateTo(id) {
  const node = graph.nodes.find(n => n.id === id);
  if (!node) return;
  layer = node.type;
  selected = id;
  document.querySelectorAll('.layer-tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.layer === layer);
  });
  renderSidebar();
  renderMain();
}

// Select within the current layer (sidebar click)
function select(id) {
  selected = id;
  renderSidebar();
  renderMain();
}

function renderSidebar() {
  const nodes = graph.nodes.filter(n => n.type === layer);
  document.getElementById('sidebar').innerHTML =
    '<div class="sidebar-label">' + LABELS[layer] + '</div>' +
    nodes.map(n =>
      '<div class="sidebar-item ' + layer + (selected === n.id ? ' active ' + layer : '') + '" onclick="select(\'' + n.id + '\')">' +
        '<span class="pip ' + layer + '"></span>' +
        '<span>' + n.label + '</span>' +
      '</div>'
    ).join('');
}

function renderMain() {
  const main = document.getElementById('main');
  if (!selected) {
    main.innerHTML = '<div class="empty-state">Select an item to explore its connections.</div>';
    return;
  }

  const node = graph.nodes.find(n => n.id === selected);
  const nodeType = node.type;

  // Edges where this node is the source (points DOWN)
  const downItems = [];
  graph.edges.forEach(function(e) {
    if (e.source === selected) {
      const t = graph.nodes.find(n => n.id === e.target);
      if (t) downItems.push({ node: t, relation: e.relation });
    }
  });

  // Edges where this node is the target (pointed UP to)
  const upItems = [];
  graph.edges.forEach(function(e) {
    if (e.target === selected) {
      const s = graph.nodes.find(n => n.id === e.source);
      if (s) upItems.push({ node: s, relation: e.relation });
    }
  });

  // Group by node type
  function groupByType(items) {
    var groups = {};
    items.forEach(function(item) {
      var t = item.node.type;
      if (!groups[t]) groups[t] = { relation: item.relation, nodes: [] };
      groups[t].nodes.push(item.node);
    });
    return groups;
  }

  var upGroups   = groupByType(upItems);
  var downGroups = groupByType(downItems);

  // Stats
  var statCounts = {};
  upItems.concat(downItems).forEach(function(item) {
    var t = item.node.type;
    statCounts[t] = (statCounts[t] || 0) + 1;
  });

  var statsHtml = Object.keys(statCounts).map(function(t) {
    return '<div class="stat"><div class="stat-n ' + t + '">' + statCounts[t] + '</div><div class="stat-lbl">' + LABELS[t] + '</div></div>';
  }).join('');

  // Build sections — up first (context), then down (detail)
  var sectionsHtml = '';

  Object.keys(upGroups).forEach(function(t) {
    var g = upGroups[t];
    var label = LABELS[t] + ' that ' + g.relation + ' this';
    sectionsHtml += '<div class="section-label">' + label + '</div><div class="chip-grid">';
    g.nodes.forEach(function(n) {
      sectionsHtml += '<div class="chip ' + n.type + '" onclick="navigateTo(\'' + n.id + '\')">' +
        '<span class="pip ' + n.type + '"></span>' + n.label + '</div>';
    });
    sectionsHtml += '</div>';
  });

  Object.keys(downGroups).forEach(function(t) {
    var g = downGroups[t];
    var label = LABELS[t] + ' (' + g.relation + ')';
    sectionsHtml += '<div class="section-label">' + label + '</div><div class="chip-grid">';
    g.nodes.forEach(function(n) {
      sectionsHtml += '<div class="chip ' + n.type + '" onclick="navigateTo(\'' + n.id + '\')">' +
        '<span class="pip ' + n.type + '"></span>' + n.label + '</div>';
    });
    sectionsHtml += '</div>';
  });

  main.innerHTML =
    '<div class="detail-type ' + nodeType + '">' + SINGULAR[nodeType] + '</div>' +
    '<h2>' + node.label + '</h2>' +
    (node.description ? '<p class="description">' + node.description + '</p>' : '') +
    (statsHtml ? '<div class="stat-row">' + statsHtml + '</div>' : '') +
    sectionsHtml;
}

load();
</script>
</body>
</html>
