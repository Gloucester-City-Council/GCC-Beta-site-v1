<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Digital Architecture</title>
<style>
:root {
  --bg:      #0d1321;
  --surface: #131c30;
  --border:  #1e2d4a;
  --text:    #e8edf5;
  --muted:   #6b7fa3;
  --accent:  #3d7fff;
  --c0: #7c5cbf;
  --c1: #2a8f7f;
  --c2: #5a7fbf;
  --c3: #3a9e6e;
  --c4: #4a78c4;
  --c5: #c4883a;
  --c6: #5a5a7a;
  --c7: #8a3a3a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── HEADER ── */
header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
}
header h1 {
  font-size: 16px;
  font-weight: 700;
  flex: 1;
}
.stat-pills {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.stat-pill {
  font-size: 11px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2px 8px;
}
.stat-pill strong { color: var(--text); }

/* ── SEARCH ── */
.search-wrap {
  padding: 12px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 53px;
  z-index: 49;
}
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }

/* ── CROSS-CUTTING STRIP ── */
.cross-strip {
  padding: 10px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  background: rgba(138,58,58,0.06);
}
.cross-chip {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--c7);
  border: 1px solid rgba(138,58,58,0.4);
  border-radius: 4px;
  padding: 4px 9px;
  cursor: pointer;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.cross-chip:active, .cross-chip.selected {
  background: rgba(138,58,58,0.2);
}

/* ── LAYERS ── */
.layers {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--border);
}

.layer {
  background: var(--bg);
  --c-layer: #444;
}

.layer-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  min-height: 52px;
  border-left: 4px solid var(--c-layer);
  transition: background 0.1s;
}
.layer-header:active { background: rgba(255,255,255,0.04); }

.layer-name {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--c-layer);
  flex: 1;
}
.layer-meta {
  font-size: 11px;
  color: var(--muted);
}
.chevron {
  font-size: 12px;
  color: var(--muted);
  transition: transform 0.2s;
  width: 16px;
  text-align: center;
}
.layer.open .chevron { transform: rotate(90deg); }

/* ── LAYER BODY ── */
.layer-body {
  display: none;
  border-top: 1px solid var(--border);
  border-left: 4px solid var(--c-layer);
}
.layer.open .layer-body { display: block; }

/* ── COMPONENTS ── */
.component {
  border-bottom: 1px solid var(--border);
}
.component:last-child { border-bottom: none; }

.component-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  cursor: pointer;
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.component-header:active { background: rgba(255,255,255,0.04); }
.component.selected .component-header { background: rgba(255,255,255,0.05); }

.component-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--c-layer);
  opacity: 0.7;
  flex-shrink: 0;
}
.component-name {
  font-size: 13px;
  font-weight: 600;
  flex: 1;
}
.component-badge {
  font-size: 10px;
  color: var(--c-layer);
  opacity: 0.7;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.comp-chevron {
  font-size: 10px;
  color: var(--muted);
  transition: transform 0.2s;
}
.component.open .comp-chevron { transform: rotate(90deg); }

/* ── SUBNODES ── */
.subnodes {
  display: none;
  background: rgba(0,0,0,0.15);
  border-top: 1px solid var(--border);
}
.component.open .subnodes { display: block; }

.subnode {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px 11px 32px;
  border-bottom: 1px solid rgba(30,45,74,0.5);
  cursor: pointer;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.subnode:last-child { border-bottom: none; }
.subnode:active { background: rgba(255,255,255,0.04); }
.subnode.selected { background: rgba(255,255,255,0.06); }

.subnode-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--c-layer);
  opacity: 0.5;
  flex-shrink: 0;
}
.subnode-label {
  font-size: 13px;
  color: var(--muted);
  flex: 1;
  line-height: 1.4;
}
.subnode:active .subnode-label,
.subnode.selected .subnode-label {
  color: var(--text);
}

/* ── FOUNDATIONS ── */
.foundations-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 14px 16px;
}
.foundation-chip {
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--c6);
  color: var(--muted);
  cursor: pointer;
  min-height: 36px;
  display: flex;
  align-items: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s, color 0.1s;
}
.foundation-chip:active, .foundation-chip.selected {
  background: rgba(90,90,122,0.25);
  color: var(--text);
}

/* ── DETAIL SHEET ── */
#detail {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0a1020;
  border-top: 2px solid var(--accent);
  z-index: 100;
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 60vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#detail.visible {
  transform: translateY(0);
}

.detail-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
}

.detail-inner {
  padding: 12px 16px 24px;
}

.detail-close-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.detail-close {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  min-height: 36px;
  min-width: 60px;
  -webkit-tap-highlight-color: transparent;
}

.detail-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
  line-height: 1.3;
}
.detail-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}
.detail-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 16px;
}

.detail-edges-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 480px) {
  .detail-edges-wrap { grid-template-columns: 1fr; }
}

.detail-section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.edge-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.edge-item {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.4;
}
.edge-item.inferred { opacity: 0.55; font-style: italic; }
.edge-rel {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(61,127,255,0.12);
  padding: 2px 5px;
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 1px;
}

/* ── SEARCH HIGHLIGHT ── */
.match { box-shadow: 0 0 0 2px var(--accent) inset !important; }
</style>
</head>

function buildIndex() {
  nodeMap = {};
  outEdges = {};
  inEdges = {};
  graph.nodes.forEach(n => nodeMap[n.id] = n);
  graph.edges.forEach(e => {
    if (!outEdges[e.source]) outEdges[e.source] = [];
    if (!inEdges[e.target])  inEdges[e.target]  = [];
    outEdges[e.source].push(e);
    inEdges[e.target].push(e);
  });
}

function render() {
  buildIndex();

  document.getElementById('stat-nodes').textContent = graph.nodes.length;
  document.getElementById('stat-edges').textContent = graph.edges.length;

  // Group by rank
  const byRank = {};
  graph.nodes.forEach(n => {
    const r = n.rank ?? 99;
    if (!byRank[r]) byRank[r] = [];
    byRank[r].push(n);
  });

  // Cross-cutting strip
  const crossStrip = document.getElementById('cross-strip');
  const crossNodes = byRank[7] || [];
  crossNodes.forEach(n => {
    const chip = document.createElement('div');
    chip.className = 'cross-chip';
    chip.textContent = n.label;
    chip.addEventListener('click', () => {
      document.querySelectorAll('.cross-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      showDetail(n.id);
    });
    crossStrip.appendChild(chip);
  });

  // Layer stack 0–6
  const layersEl = document.getElementById('layers');
  [0,1,2,3,4,5,6].forEach(rank => {
    const nodes = byRank[rank] || [];
    if (!nodes.length) return;

    const layerNode = nodes.find(n => n.type === 'layer' || n.type === 'foundation');
    const color = LAYER_COLORS[rank];
    const name  = LAYER_NAMES[rank];
    const components = nodes.filter(n => n.type === 'component' || n.type === 'system');
    const allSubs = nodes.filter(n => n.type === 'subnode');
    const count = components.length + allSubs.length;

    const layerEl = document.createElement('div');
    layerEl.className = 'layer';
    layerEl.style.setProperty('--c-layer', color);
    layerEl.dataset.rank = rank;

    // Layer header
    const hdr = document.createElement('div');
    hdr.className = 'layer-header';
    hdr.innerHTML = `
      <span class="layer-name">${name}</span>
      <span class="layer-meta">${count} elements</span>
      <span class="chevron">▶</span>
    `;
    hdr.addEventListener('click', () => {
      const wasOpen = layerEl.classList.contains('open');
      layerEl.classList.toggle('open');
      if (layerNode && !wasOpen) showDetail(layerNode.id);
    });
    layerEl.appendChild(hdr);

    // Layer body
    const body = document.createElement('div');
    body.className = 'layer-body';

    if (rank === 6) {
      // Foundations: chip strip
      const strip = document.createElement('div');
      strip.className = 'foundations-strip';
      allSubs.concat(components).forEach(n => {
        const chip = document.createElement('div');
        chip.className = 'foundation-chip';
        chip.dataset.id = n.id;
        chip.textContent = n.label;
        chip.addEventListener('click', e => {
          e.stopPropagation();
          document.querySelectorAll('.foundation-chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
          showDetail(n.id);
        });
        strip.appendChild(chip);
      });
      body.appendChild(strip);
    } else {
      // Components with collapsible subnodes
      components.forEach(comp => {
        const childIds = (outEdges[comp.id] || [])
          .filter(e => e.relation === 'contains')
          .map(e => e.target);
        const children = childIds.map(id => nodeMap[id]).filter(n => n && n.type === 'subnode');

        const compEl = document.createElement('div');
        compEl.className = 'component';

        const compHdr = document.createElement('div');
        compHdr.className = 'component-header';
        compHdr.dataset.id = comp.id;
        compHdr.innerHTML = `
          <div class="component-dot"></div>
          <div class="component-name">${comp.label}</div>
          <div class="component-badge">${comp.type}</div>
          ${children.length ? '<span class="comp-chevron">▶</span>' : ''}
        `;
        compHdr.addEventListener('click', e => {
          e.stopPropagation();
          document.querySelectorAll('.component').forEach(c => c.classList.remove('selected'));
          compEl.classList.add('selected');
          if (children.length) compEl.classList.toggle('open');
          showDetail(comp.id);
        });
        compEl.appendChild(compHdr);

        if (children.length) {
          const subsEl = document.createElement('div');
          subsEl.className = 'subnodes';
          children.forEach(sub => {
            const subEl = document.createElement('div');
            subEl.className = 'subnode';
            subEl.dataset.id = sub.id;
            subEl.innerHTML = `
              <div class="subnode-dot"></div>
              <div class="subnode-label">${sub.label}</div>
            `;
            subEl.addEventListener('click', e => {
              e.stopPropagation();
              document.querySelectorAll('.subnode').forEach(s => s.classList.remove('selected'));
              subEl.classList.add('selected');
              showDetail(sub.id);
            });
            subsEl.appendChild(subEl);
          });
          compEl.appendChild(subsEl);
        }

        body.appendChild(compEl);
      });
    }

    layerEl.appendChild(body);

    // Auto-open top two layers
    if (rank === 0 || rank === 1) layerEl.classList.add('open');

    layersEl.appendChild(layerEl);
  });

  // Search
  document.getElementById('search').addEventListener('input', e => doSearch(e.target.value.trim().toLowerCase()));

  // Detail close
  document.getElementById('detail-close').addEventListener('click', closeDetail);

  // Swipe down to close detail
  let touchStartY = 0;
  const detailEl = document.getElementById('detail');
  detailEl.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
  detailEl.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - touchStartY > 60) closeDetail();
  }, {passive:true});
}

function showDetail(id) {
  const node = nodeMap[id];
  if (!node) return;

  const color = LAYER_COLORS[node.rank ?? node.layer ?? 7];
  const layerName = LAYER_NAMES[node.rank ?? node.layer ?? 7] || '';

  document.getElementById('detail-title-area').innerHTML = `
    <div class="detail-title">${node.label}</div>
    <span class="detail-badge" style="background:${color}20;color:${color}">${layerName} · ${node.type}</span>
  `;

  document.getElementById('detail-desc').innerHTML = node.detail
    ? `<div class="detail-desc">${node.detail}</div>` : '';

  const outs = (outEdges[id] || []).slice(0,12);
  const ins  = (inEdges[id]  || []).slice(0,12);

  document.getElementById('out-title').textContent = `Outgoing (${outs.length})`;
  document.getElementById('in-title').textContent  = `Incoming (${ins.length})`;

  document.getElementById('detail-out').innerHTML = outs.length
    ? outs.map(e => {
        const t = nodeMap[e.target];
        return `<div class="edge-item ${e.confidence==='INFERRED'?'inferred':''}">
          <span class="edge-rel">${e.relation}</span>
          ${t ? t.label : e.target}
        </div>`;
      }).join('')
    : '<span style="font-size:12px;color:var(--muted)">None</span>';

  document.getElementById('detail-in').innerHTML = ins.length
    ? ins.map(e => {
        const s = nodeMap[e.source];
        return `<div class="edge-item ${e.confidence==='INFERRED'?'inferred':''}">
          <span class="edge-rel">${e.relation}</span>
          ${s ? s.label : e.source}
        </div>`;
      }).join('')
    : '<span style="font-size:12px;color:var(--muted)">None</span>';

  document.getElementById('detail').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('visible');
  document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
}

function doSearch(q) {
  document.querySelectorAll('[data-id], [data-rank]').forEach(el => el.classList.remove('match'));
  if (!q) return;

  graph.nodes.forEach(node => {
    if (!node.label.toLowerCase().includes(q)) return;

    // Open parent layer
    const rank = node.rank ?? node.layer;
    const layerEl = document.querySelector(`.layer[data-rank="${rank}"]`);
    if (layerEl) {
      layerEl.classList.add('open');
      // Also open parent component
      const compIds = (inEdges[node.id]||[])
        .filter(e => e.relation==='contains')
        .map(e => e.source);
      compIds.forEach(cid => {
        const compEl = document.querySelector(`.component-header[data-id="${cid}"]`);
        if (compEl) compEl.closest('.component').classList.add('open');
      });
    }

    // Highlight
    const el = document.querySelector(`[data-id="${node.id}"]`);
    if (el) el.classList.add('match');
  });
}
