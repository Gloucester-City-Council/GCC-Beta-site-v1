<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Council Architecture — Graph Explorer</title>
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161e;
  --surface2: #1a1e2a;
  --border: #252b3b;
  --border2: #2f3750;
  --text: #dce3f0;
  --dim: #6b7a99;
  --muted: #3a4360;

  --c-service:    #7c6af7;
  --c-pattern:    #27a8c4;
  --c-layer:      #e09a3a;
  --c-component:  #3ea87a;
  --c-subnode:    #3d72b8;
  --c-cross:      #c45080;
  --c-system:     #7a8899;

  --r-comprises:   #3ea87a;
  --r-requires:    #27a8c4;
  --r-feeds:       #7c6af7;
  --r-governs:     #c45080;
  --r-integrates:  #e09a3a;
  --r-produces:    #4a9e8a;
  --r-informs:     #5a7ab8;
  --r-uses:        #7c6af7;
  --r-depends:     #e09a3a;
  --r-resolved:    #27a8c4;
  --r-contains:    #3ea87a;
  --r-implemented: #7a8899;
  --r-enters:      #c45080;
  --r-other:       #6b7a99;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 12px;
  height: 100vh;
  display: grid;
  grid-template-rows: 48px 1fr;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.wordmark {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  white-space: nowrap;
  margin-right: 4px;
}

.sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

.chips { display: flex; gap: 4px; flex-wrap: nowrap; overflow-x: auto; flex: 1; }
.chips::-webkit-scrollbar { display: none; }

.chip {
  padding: 3px 9px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--dim);
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 0.06em;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.12s;
  flex-shrink: 0;
}
.chip:hover { color: var(--text); border-color: var(--dim); }
.chip.on { border-color: transparent; color: #0d0f14; }
.chip[data-t="all"].on      { background: var(--dim); }
.chip[data-t="service"].on  { background: var(--c-service); }
.chip[data-t="pattern"].on  { background: var(--c-pattern); }
.chip[data-t="layer"].on    { background: var(--c-layer); }
.chip[data-t="component"].on { background: var(--c-component); }
.chip[data-t="subnode"].on  { background: var(--c-subnode); }
.chip[data-t="cross_cutting"].on { background: var(--c-cross); }
.chip[data-t="system"].on   { background: var(--c-system); }

#q {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--surface2);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  width: 160px;
  outline: none;
  flex-shrink: 0;
}
#q:focus { border-color: var(--border2); }
#q::placeholder { color: var(--muted); }

/* ── LAYOUT ── */
.panes {
  display: grid;
  grid-template-columns: 256px 1fr 288px;
  overflow: hidden;
  height: 100%;
}

/* ── LEFT LIST ── */
.list-pane {
  border-right: 1px solid var(--border);
  overflow-y: scroll;
  background: var(--surface);
}
.list-pane::-webkit-scrollbar { width: 3px; }
.list-pane::-webkit-scrollbar-thumb { background: var(--border2); }
.list-pane { scrollbar-gutter: stable; }

.list-empty {
  padding: 20px 14px;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

.list-item {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.list-item:hover { background: var(--surface2); }
.list-item.sel { background: var(--surface2); border-left: 2px solid var(--border2); padding-left: 10px; }

.list-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.list-text { flex: 1; min-width: 0; }
.list-label { line-height: 1.35; color: var(--text); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-meta { font-size: 9px; color: var(--muted); margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; }

/* ── CENTRE DETAIL ── */
.detail-pane {
  overflow-y: auto;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}
.detail-pane::-webkit-scrollbar { width: 3px; }
.detail-pane::-webkit-scrollbar-thumb { background: var(--border2); }
.detail-pane { scrollbar-gutter: stable; }

.detail-empty {
  display: flex;
  height: 100%;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.node-header { display: flex; gap: 12px; align-items: flex-start; }
.node-bigdot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.node-title { font-size: 20px; font-weight: 700; line-height: 1.2; font-family: system-ui, -apple-system, sans-serif; letter-spacing: -0.02em; }
.node-badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.badge {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 2px;
  border: 1px solid var(--border2);
  color: var(--dim);
}
.badge.type { border-color: transparent; color: #0d0f14; }

.node-detail {
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 13px;
  line-height: 1.65;
  color: var(--dim);
}

.conn-section { display: flex; flex-direction: column; gap: 14px; }
.conn-head {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.rel-group { display: flex; flex-direction: column; gap: 3px; }
.rel-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 7px 2px 5px;
  border-radius: 2px;
  margin-bottom: 4px;
  width: fit-content;
}
.rel-tag::before { content: ''; display: block; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

.conn-node {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: border-color 0.1s, background 0.1s;
  margin-left: 4px;
}
.conn-node:hover { background: var(--surface2); border-color: var(--border); }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.conn-label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conn-type { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }

/* ── RIGHT TRAIL ── */
.trail-pane {
  border-left: 1px solid var(--border);
  background: var(--surface);
  overflow-y: auto;
  padding: 14px 12px;
}
.trail-pane::-webkit-scrollbar { width: 3px; }
.trail-pane::-webkit-scrollbar-thumb { background: var(--border2); }
.trail-pane { scrollbar-gutter: stable; }

.trail-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.trail-clear {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  padding: 0;
}
.trail-clear:hover { color: var(--dim); }

.trail-empty { color: var(--muted); font-size: 10px; text-align: center; padding: 16px 4px; letter-spacing: 0.06em; }

.trail-step { display: flex; flex-direction: column; }
.trail-node {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: border-color 0.1s, background 0.1s;
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 11px;
}
.trail-node:hover { background: var(--surface2); border-color: var(--border); }
.trail-node.cur { background: var(--surface2); border-color: var(--border2); }
.trail-via {
  padding: 3px 8px 3px 23px;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

/* rel colours */
.rel-comprises   { color: var(--r-comprises); }
.rel-requires    { color: var(--r-requires); }
.rel-feeds       { color: var(--r-feeds); }
.rel-governs     { color: var(--r-governs); }
.rel-integrates  { color: var(--r-integrates); }
.rel-produces    { color: var(--r-produces); }
.rel-informs     { color: var(--r-informs); }
.rel-uses        { color: var(--r-uses); }
.rel-depends     { color: var(--r-depends); }
.rel-resolved    { color: var(--r-resolved); }
.rel-contains    { color: var(--r-contains); }
.rel-implemented { color: var(--r-implemented); }
.rel-enters      { color: var(--r-enters); }
.rel-other       { color: var(--r-other); }
</style>
</head>
<body>

<header>
  <span class="wordmark">GCC Architecture</span>
  <div class="sep"></div>
  <div class="chips" id="chips">
    <button class="chip on" data-t="all">All</button>
    <button class="chip" data-t="service">Service</button>
    <button class="chip" data-t="pattern">Pattern</button>
    <button class="chip" data-t="layer">Layer</button>
    <button class="chip" data-t="component">Component</button>
    <button class="chip" data-t="subnode">Subnode</button>
    <button class="chip" data-t="cross_cutting">Cross-cutting</button>
    <button class="chip" data-t="system">System</button>
  </div>
  <div class="sep"></div>
  <input id="q" type="search" placeholder="Search…" autocomplete="off">
</header>

<div class="panes" id="panes">
  <div class="list-pane" id="list-pane"><div class="list-empty">Loading…</div></div>
  <div class="detail-pane" id="detail-pane"><div class="detail-empty">Loading…</div></div>
  <div class="trail-pane" id="trail-pane"></div>
</div>


<script>
const TYPE_COLOR = {
  service:'#7c6af7', pattern:'#27a8c4', layer:'#e09a3a',
  component:'#3ea87a', subnode:'#3d72b8', cross_cutting:'#c45080', system:'#7a8899'
};

function relClass(label) {
  const map = {
    'comprises':'rel-comprises','requires':'rel-requires','feeds':'rel-feeds',
    'governs':'rel-governs','integrates':'rel-integrates','produces':'rel-produces',
    'informs':'rel-informs','uses':'rel-uses','depends on':'rel-depends',
    'resolved by':'rel-resolved','contains':'rel-contains',
    'implemented by':'rel-implemented','enters via':'rel-enters','part of':'rel-other'
  };
  return map[label] || 'rel-other';
}

function layerTag(layer) {
  const m = {0:'L0 Customer',1:'L1 Access',2:'L2 Information',3:'L3 Capabilities',4:'L4 Orchestration',5:'L5 Determination',cross_cutting:'Cross-cutting'};
  return (layer !== null && layer !== undefined) ? (m[layer] || String(layer)) : '';
}

function color(type) { return TYPE_COLOR[type] || '#888'; }

function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

let G = null, nodeMap = {}, outE = {}, inE = {};
let sel = null, activeFilter = 'all', searchQ = '', trail = [];

function build() {
  nodeMap = {}; outE = {}; inE = {};
  G.nodes.forEach(n => { nodeMap[n.id] = n; outE[n.id] = []; inE[n.id] = []; });
  G.edges.forEach(e => {
    const lbl = e.label || 'part of';
    if (outE[e.source]) outE[e.source].push({ id: e.target, label: lbl });
    if (inE[e.target])  inE[e.target].push({ id: e.source, label: lbl });
  });
}

function visible() {
  return G.nodes.filter(n => {
    if (activeFilter !== 'all' && n.type !== activeFilter) return false;
    if (searchQ && !n.label.toLowerCase().includes(searchQ)) return false;
    return true;
  });
}

function renderList() {
  const pane = document.getElementById('list-pane');
  pane.innerHTML = '';
  const nodes = visible();
  if (!nodes.length) {
    pane.innerHTML = '<div class="list-empty">No nodes match</div>';
    return;
  }
  nodes.forEach(n => {
    const item = el('div', 'list-item' + (n.id === sel ? ' sel' : ''));
    const dot = el('div','list-dot'); dot.style.background = color(n.type);
    const text = el('div','list-text');
    const lbl = el('div','list-label'); lbl.textContent = n.label;
    const meta = el('div','list-meta');
    meta.textContent = layerTag(n.layer) || n.type;
    text.appendChild(lbl); text.appendChild(meta);
    item.appendChild(dot); item.appendChild(text);
    item.addEventListener('click', () => pick(n.id, null));
    pane.appendChild(item);
  });
}

function renderDetail() {
  const pane = document.getElementById('detail-pane');
  pane.innerHTML = '';
  if (!sel) {
    pane.innerHTML = '<div class="detail-empty">Select a node</div>';
    return;
  }
  const n = nodeMap[sel];
  if (!n) return;

  const header = el('div','node-header');
  const bigdot = el('div','node-bigdot'); bigdot.style.background = color(n.type);
  const htext = el('div');
  const title = el('div','node-title'); title.textContent = n.label;
  const badges = el('div','node-badges');
  const tb = el('span','badge type'); tb.style.background = color(n.type); tb.textContent = n.type.replace('_',' ');
  badges.appendChild(tb);
  const lt = layerTag(n.layer);
  if (lt) { const lb = el('span','badge'); lb.textContent = lt; badges.appendChild(lb); }
  const deg = el('span','badge'); deg.textContent = ((outE[sel]?.length||0)+(inE[sel]?.length||0))+' connections';
  badges.appendChild(deg);
  htext.appendChild(title); htext.appendChild(badges);
  header.appendChild(bigdot); header.appendChild(htext);
  pane.appendChild(header);

  if (n.detail) { const d = el('div','node-detail'); d.textContent = n.detail; pane.appendChild(d); }

  renderConnSection(pane, outE[sel]||[], 'Connects to', false);
  renderConnSection(pane, inE[sel]||[], 'Referenced by', true);
}

function renderConnSection(pane, edges, heading, isInbound) {
  if (!edges.length) return;
  const sec = el('div','conn-section');
  const h = el('div','conn-head'); h.textContent = heading; sec.appendChild(h);
  const groups = {};
  edges.forEach(e => {
    const lbl = e.label || 'part of';
    if (!groups[lbl]) groups[lbl] = [];
    groups[lbl].push(e.id);
  });
  Object.entries(groups).forEach(([lbl, ids]) => {
    const g = el('div','rel-group');
    const tag = el('div','rel-tag '+relClass(lbl));
    tag.textContent = isInbound ? '← '+lbl : lbl;
    g.appendChild(tag);
    ids.forEach(id => {
      const t = nodeMap[id]; if (!t) return;
      const row = el('div','conn-node');
      const dot = el('div','conn-dot'); dot.style.background = color(t.type);
      const l = el('div','conn-label'); l.textContent = t.label;
      const ty = el('div','conn-type'); ty.textContent = t.type.replace('_',' ');
      row.appendChild(dot); row.appendChild(l); row.appendChild(ty);
      row.addEventListener('click', () => pick(id, lbl));
      g.appendChild(row);
    });
    sec.appendChild(g);
  });
  pane.appendChild(sec);
}

function renderTrail() {
  const pane = document.getElementById('trail-pane');
  pane.innerHTML = '';
  const head = el('div','trail-head');
  head.innerHTML = '<span>Walk</span>';
  const clr = el('button','trail-clear'); clr.textContent = 'Clear';
  clr.addEventListener('click', () => { trail = []; renderTrail(); });
  head.appendChild(clr); pane.appendChild(head);

  if (!trail.length) {
    const e = el('div','trail-empty'); e.textContent = 'Click connections to walk the graph'; pane.appendChild(e);
    return;
  }
  trail.forEach((step, i) => {
    const n = nodeMap[step.id]; if (!n) return;
    const isCur = i === trail.length - 1;
    const s = el('div','trail-step');
    if (i > 0 && step.via) { const via = el('div','trail-via'); via.textContent = '↓ '+step.via; s.appendChild(via); }
    const row = el('div','trail-node'+(isCur?' cur':''));
    const dot = el('div','list-dot'); dot.style.background = color(n.type); dot.style.flexShrink='0';
    const lbl = el('div'); lbl.textContent = n.label; lbl.style.flex='1'; lbl.style.fontSize='11px';
    row.appendChild(dot); row.appendChild(lbl);
    row.addEventListener('click', () => { trail = trail.slice(0,i+1); sel = step.id; renderAll(); scrollToSel(); });
    s.appendChild(row); pane.appendChild(s);
  });
}

function renderAll() { renderList(); renderDetail(); renderTrail(); }

function pick(id, via) {
  sel = id;
  const idx = trail.findIndex(t => t.id === id);
  if (idx >= 0) trail = trail.slice(0, idx+1);
  else trail.push({ id, via });
  const n = nodeMap[id];
  if (n && activeFilter !== 'all' && n.type !== activeFilter) {
    activeFilter = 'all';
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
    document.querySelector('.chip[data-t="all"]').classList.add('on');
  }
  renderAll();
  scrollToSel();
}

function scrollToSel() {
  document.querySelector('.list-item.sel')?.scrollIntoView({ block:'nearest' });
}

document.getElementById('chips').addEventListener('click', ev => {
  if (!G) return;
  const c = ev.target.closest('.chip'); if (!c) return;
  document.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
  c.classList.add('on');
  activeFilter = c.dataset.t;
  renderList();
});

document.getElementById('q').addEventListener('input', ev => {
  if (!G) return;
  searchQ = ev.target.value.toLowerCase().trim();
  renderList();
});

fetch('council-architecture-v12-kg-v15.json')
  .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(data => {
    G = data; build();
    renderAll();
  })
  .catch(err => {
    document.getElementById('detail-pane').innerHTML =
      '<div style="padding:32px;color:#c45080;font-size:12px;line-height:1.8">Could not load <code>council-architecture-v12-kg-v15.json</code><br>Error: '+err.message+'</div>';
  });
</script>
</body>
</html>
