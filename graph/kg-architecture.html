<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Council Architecture — Overview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d0f14;
  color: #dce3f0;
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  padding: 24px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid #252b3b;
}

header h1 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #6b7a99;
  font-family: 'SF Mono', monospace;
}

.legend {
  display: flex;
  gap: 16px;
  align-items: center;
}

.leg {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: #6b7a99;
  font-family: 'SF Mono', monospace;
  letter-spacing: 0.06em;
}

.leg-dot { width: 8px; height: 8px; border-radius: 2px; }

/* ── OUTER WRAPPER ── */
.outer {
  display: grid;
  grid-template-columns: 100px 1fr 100px;
  gap: 0;
  align-items: start;
  position: relative;
}

/* ── SIDE ARC PANELS ── */
.arc-panel {
  position: relative;
}

.arc-panel svg {
  display: block;
  width: 100%;
}

/* ── CENTRE COLUMN ── */
.centre {
  min-width: 0;
}

/* ── SERVICE + PATTERN ROW ── */
.row-top {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.service-band, .pattern-band {
  border-radius: 6px;
  padding: 10px 12px;
}

.service-band { background: #1a1730; border: 1px solid #3a2e70; }
.pattern-band { background: #0e2430; border: 1px solid #1e4a60; }

.band-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-family: 'SF Mono', monospace;
}

.service-band .band-label { color: #7c6af7; }
.pattern-band .band-label { color: #27a8c4; }

.pills { display: flex; flex-wrap: wrap; gap: 5px; }

.pill {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  white-space: nowrap;
}

.pill-service { background: #2a1f5a; color: #a89ef7; border: 1px solid #3a2e80; }
.pill-pattern { background: #0a2535; color: #5bc8e0; border: 1px solid #1a4a60; }

/* ── STACK ── */
.stack { display: flex; flex-direction: column; gap: 6px; }

.arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 14px;
  color: #3a4360;
  font-size: 12px;
}

/* ── LAYER ── */
.layer { border-radius: 6px; overflow: hidden; border-width: 1px; border-style: solid; }

.layer-header {
  padding: 6px 12px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: 'SF Mono', monospace;
}

.layer-body { display: grid; gap: 6px; padding: 8px; }

.l0 { background: #0f1220; border-color: #2a3060; }
.l0 .layer-header { background: #1a1f40; color: #7080d0; }
.l0 .layer-body { grid-template-columns: 1fr 1fr; }

.l1 { background: #0f1e20; border-color: #1a4a50; }
.l1 .layer-header { background: #0f2a30; color: #30b4c4; }
.l1 .layer-body { grid-template-columns: 1fr 1fr 1fr; }

.l2 { background: #150f20; border-color: #3a1a60; }
.l2 .layer-header { background: #200f30; color: #a06ad4; }
.l2 .layer-body { grid-template-columns: 1fr 1fr 1fr; }

.l3 { background: #0f201a; border-color: #1a5040; }
.l3 .layer-header { background: #0f2820; color: #3ea87a; }
.l3 .layer-body { grid-template-columns: 1fr 1fr 1fr 1fr; }

.l4 { background: #0f1a25; border-color: #1a3a5a; }
.l4 .layer-header { background: #0f2035; color: #4a90d4; }
.l4 .layer-body { grid-template-columns: 1fr 1fr 1fr; }

.l5 { background: #201a0f; border-color: #4a3a10; }
.l5 .layer-header { background: #281e0a; color: #c4a030; }
.l5 .layer-body { grid-template-columns: 1fr 1fr 1fr; }

.tf { background: #141414; border-color: #2a2a2a; }
.tf .layer-header { background: #1e1e1e; color: #6b7a99; }
.tf .layer-body { grid-template-columns: repeat(6, 1fr); }

/* ── COMPONENT CARD ── */
.comp { border-radius: 4px; padding: 8px 10px; border: 1px solid transparent; }

.l0 .comp { background: #1a2050; border-color: #2a3070; }
.l1 .comp { background: #0f2a35; border-color: #1a4a58; }
.l2 .comp { background: #200f35; border-color: #3a1a58; }
.l3 .comp { background: #0f2820; border-color: #1a4838; }
.l4 .comp { background: #0f2035; border-color: #1a3858; }
.l5 .comp { background: #282010; border-color: #483810; }
.tf  .comp { background: #1a1a1a; border-color: #2a2a2a; }

.comp-name { font-size: 10px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }

.l0 .comp-name { color: #9ab0f0; }
.l1 .comp-name { color: #5bc8d8; }
.l2 .comp-name { color: #b888e8; }
.l3 .comp-name { color: #5ac898; }
.l4 .comp-name { color: #5aa8e8; }
.l5 .comp-name { color: #d8b848; }
.tf  .comp-name { color: #8898b8; }

.comp-subs { display: flex; flex-wrap: wrap; gap: 3px; }

.sub {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

.l0 .sub { background: #141840; color: #7080c0; }
.l1 .sub { background: #0a2030; color: #2a9ab0; }
.l2 .sub { background: #180a2e; color: #8858c0; }
.l3 .sub { background: #0a2018; color: #2a9870; }
.l4 .sub { background: #0a1828; color: #2a78b8; }
.l5 .sub { background: #201808; color: #b09038; }
.tf  .sub { background: #101010; color: #5a6878; }

.referral-note {
  font-size: 9px;
  color: #4a90d4;
  font-family: 'SF Mono', monospace;
  letter-spacing: 0.06em;
  padding: 4px 10px;
  border-left: 2px solid #1a3a60;
  margin: 0 2px;
}
</style>
</head>
<body>

<header>
  <h1>GCC — Digital Architecture</h1>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#7c6af7"></div>Service</div>
    <div class="leg"><div class="leg-dot" style="background:#27a8c4"></div>Pattern</div>
    <div class="leg"><div class="leg-dot" style="background:#3ea87a"></div>Capability</div>
    <div class="leg"><div class="leg-dot" style="background:#4a90d4"></div>Orchestration</div>
    <div class="leg"><div class="leg-dot" style="background:#c4a030"></div>Determination</div>
  </div>
</header>

<div class="outer" id="outer">
  <div style="color:#3a4360;font-size:11px;font-family:monospace;padding:20px;grid-column:1/-1;text-align:center">Loading…</div>
</div>

<script>
const LAYER_ORDER = ['layer_customer','layer_access','layer_information','layer_capabilities','layer_orchestration','layer_determination'];

const LAYER_DEFS = [
  { id: 'layer_customer',      cls: 'l0', label: 'Customer' },
  { id: 'layer_access',        cls: 'l1', label: 'Access' },
  { id: 'layer_information',   cls: 'l2', label: 'Information' },
  { id: 'layer_capabilities',  cls: 'l3', label: 'Capabilities' },
  { id: 'layer_orchestration', cls: 'l4', label: 'Orchestration' },
  { id: 'layer_determination', cls: 'l5', label: 'Determination' },
];

const CC_CONFIG = [
  { id: 'cross_ai',        label: 'AI', color: '#4a90d4', side: 'left' },
  { id: 'cross_digital_cx',label: 'Digital & CX', color: '#a06ad4', side: 'left' },
  { id: 'cross_mon',       label: 'Monitoring', color: '#4ab870', side: 'left' },  
  { id: 'cross_monitoring', label: 'Monitoring', color: '#4ab870', side: 'left' },
  { id: 'cross_auto',      label: 'Automation', color: '#c4a030', side: 'right' },
  { id: 'cross_automation',label: 'Automation', color: '#c4a030', side: 'right' },
  { id: 'cross_resolution_feedback', label: 'Resolution feedback', color: '#c45060', side: 'right' },
  { id: 'cross_accessibility', label: 'Accessibility', color: '#30b4c4', side: 'right' },
];

function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

fetch('council-architecture-v12-kg-v15.json')
  .then(r => r.json())
  .then(g => {
    const nmap = {};
    g.nodes.forEach(n => nmap[n.id] = n);
    const outE = {};
    g.edges.forEach(e => {
      if (!outE[e.source]) outE[e.source] = [];
      outE[e.source].push(e);
    });

    function compsOf(id, rel) {
      return (outE[id]||[]).filter(e => e.label===rel).map(e => nmap[e.target]).filter(Boolean);
    }
    function subsOf(id) {
      return compsOf(id,'comprises').filter(n => n.type==='subnode');
    }

    // ── Build centre ──
    const outer = document.getElementById('outer');
    outer.innerHTML = '';

    // Left arc panel placeholder
    const leftPanel = el('div','arc-panel');
    leftPanel.id = 'left-panel';
    outer.appendChild(leftPanel);

    // Centre
    const centre = el('div','centre');

    // Top row
    const topRow = el('div','row-top');

    const svcBand = el('div','service-band');
    svcBand.innerHTML = '<div class="band-label">Services</div>';
    const svcPills = el('div','pills');
    g.nodes.filter(n => n.type==='service').forEach(n => {
      const p = el('div','pill pill-service'); p.textContent = n.label; svcPills.appendChild(p);
    });
    svcBand.appendChild(svcPills);

    const patBand = el('div','pattern-band');
    patBand.innerHTML = '<div class="band-label">Journey patterns</div>';
    const patPills = el('div','pills');
    g.nodes.filter(n => n.type==='pattern').forEach(n => {
      const p = el('div','pill pill-pattern'); p.textContent = n.label; patPills.appendChild(p);
    });
    patBand.appendChild(patPills);

    topRow.appendChild(svcBand);
    topRow.appendChild(patBand);
    centre.appendChild(topRow);

    // Stack
    const stack = el('div','stack');
    stack.id = 'stack';

    LAYER_DEFS.forEach((ld, i) => {
      if (i > 0) { const a = el('div','arrow'); a.textContent = '↓'; stack.appendChild(a); }
      const layer = el('div','layer '+ld.cls);
      layer.dataset.layerId = ld.id;
      layer.dataset.layerIdx = i;
      const hdr = el('div','layer-header'); hdr.textContent = ld.label;
      layer.appendChild(hdr);
      const body = el('div','layer-body');
      compsOf(ld.id,'comprises').filter(n=>n.type==='component').forEach(c => {
        const card = el('div','comp');
        const name = el('div','comp-name'); name.textContent = c.label;
        card.appendChild(name);
        const subs = subsOf(c.id);
        if (subs.length) {
          const sd = el('div','comp-subs');
          subs.slice(0,4).forEach(s => {
            const sub = el('div','sub'); sub.textContent = s.label; sub.title = s.label; sd.appendChild(sub);
          });
          card.appendChild(sd);
        }
        body.appendChild(card);
      });
      if (ld.id === 'layer_access') {
        const note = el('div','referral-note');
        note.textContent = '↘ Inbound referral enters here → Triage Engine';
        note.style.gridColumn = '1 / -1';
        body.appendChild(note);
      }
      layer.appendChild(body);
      stack.appendChild(layer);
    });

    // TF
    const tfarr = el('div','arrow'); tfarr.textContent = '↓'; stack.appendChild(tfarr);
    const tfLayer = el('div','layer tf');
    tfLayer.dataset.layerId = 'technology_foundations';
    tfLayer.dataset.layerIdx = 6;
    const tfHdr = el('div','layer-header'); tfHdr.textContent = 'Technology foundations';
    tfLayer.appendChild(tfHdr);
    const tfBody = el('div','layer-body');
    subsOf('technology_foundations').forEach(s => {
      const card = el('div','comp');
      const name = el('div','comp-name'); name.textContent = s.label;
      card.appendChild(name);
      tfBody.appendChild(card);
    });
    tfLayer.appendChild(tfBody);
    stack.appendChild(tfLayer);

    centre.appendChild(stack);
    outer.appendChild(centre);

    // Right arc panel placeholder
    const rightPanel = el('div','arc-panel');
    rightPanel.id = 'right-panel';
    outer.appendChild(rightPanel);

    // ── Draw arcs after layout ──
    requestAnimationFrame(() => drawArcs(g, nmap, outE));
  });

function drawArcs(g, nmap, outE) {
  const stackEl = document.getElementById('stack');
  const outerEl = document.getElementById('outer');
  const leftPanel = document.getElementById('left-panel');
  const rightPanel = document.getElementById('right-panel');

  // Measure each layer's vertical position relative to stack
  const layerEls = stackEl.querySelectorAll('.layer');
  const stackRect = stackEl.getBoundingClientRect();
  const outerRect = outerEl.getBoundingClientRect();

  // Build layer id -> {top, bottom} in outer-relative coords
  const layerPos = {};
  layerEls.forEach(lel => {
    const r = lel.getBoundingClientRect();
    layerPos[lel.dataset.layerId] = {
      top: r.top - outerRect.top,
      bottom: r.bottom - outerRect.top,
      mid: (r.top + r.bottom) / 2 - outerRect.top
    };
  });

  const totalH = outerRect.height;

  // ── Determine span for each CC node ──
  const cc_nodes = g.nodes.filter(n => n.type === 'cross_cutting');

  const leftCCs = [];
  const rightCCs = [];

  // Assign sides
  const rightIds = new Set(['cross_automation','cross_resolution_feedback','cross_accessibility']);

  cc_nodes.forEach(cc => {
    // Get governed layers
    const governed = (outE[cc.id]||[]).filter(e => e.label==='governs').map(e => e.target);
    const layerIdxs = governed
      .map(id => LAYER_ORDER.indexOf(id))
      .filter(i => i >= 0);
    // Also check component-level governs
    governed.forEach(id => {
      const n = nmap[id];
      if (n && typeof n.layer === 'number') layerIdxs.push(n.layer);
    });

    if (!layerIdxs.length) return;
    const minL = Math.min(...layerIdxs);
    const maxL = Math.max(...layerIdxs);
    const minId = LAYER_ORDER[minL];
    const maxId = LAYER_ORDER[maxL];

    const pos = layerPos[minId] && layerPos[maxId] ? {
      top: layerPos[minId].top,
      bottom: layerPos[maxId].bottom
    } : null;

    if (!pos) return;

    const cfg = { label: cc.label, top: pos.top, bottom: pos.bottom };

    // Colour lookup
    const colMap = {
      'AI — Reasoning, Retrieval, Drafting, Routing': '#4a90d4',
      'Digital and Customer Experience': '#a06ad4',
      'Monitoring and Reporting': '#4ab870',
      'Automation': '#c4a030',
      'Resolution Feedback to Customer': '#c45060',
      'Accessibility': '#30b4c4',
    };
    cfg.color = colMap[cc.label] || '#6b7a99';
    cfg.isFeedback = cc.id === 'cross_resolution_feedback';

    if (rightIds.has(cc.id)) rightCCs.push(cfg);
    else leftCCs.push(cfg);
  });

  // ── Draw SVG for a side ──
  function drawSide(panel, ccs, side) {
    const W = 96;
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', W);
    svg.setAttribute('height', totalH);
    svg.setAttribute('viewBox', `0 0 ${W} ${totalH}`);
    svg.style.overflow = 'visible';

    const count = ccs.length;
    const arcStep = Math.floor((W - 20) / count);

    ccs.forEach((cc, i) => {
      const depth = side === 'left'
        ? W - 10 - i * arcStep
        : 10 + i * arcStep;

      const x0 = side === 'left' ? W : 0;
      const topY = cc.top + 8;
      const botY = cc.bottom - 8;
      const midY = (topY + botY) / 2;

      // Draw bracket arc
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');

      let d;
      if (cc.isFeedback) {
        // Feedback arc goes upward — dashed return arrow
        const cx = side === 'left' ? depth : depth;
        d = `M ${x0} ${botY} C ${cx} ${botY} ${cx} ${topY} ${x0} ${topY}`;
        path.setAttribute('stroke-dasharray','5 3');
      } else {
        d = `M ${x0} ${topY} C ${depth} ${topY} ${depth} ${botY} ${x0} ${botY}`;
      }

      path.setAttribute('d', d);
      path.setAttribute('fill','none');
      path.setAttribute('stroke', cc.color);
      path.setAttribute('stroke-width','1.5');
      path.setAttribute('opacity','0.7');
      svg.appendChild(path);

      // End caps (short horizontal ticks)
      [[topY, false],[botY, true]].forEach(([y, isBottom]) => {
        const tick = document.createElementNS('http://www.w3.org/2000/svg','line');
        const tickLen = 8;
        if (side === 'left') {
          tick.setAttribute('x1', x0 - tickLen); tick.setAttribute('x2', x0);
        } else {
          tick.setAttribute('x1', x0); tick.setAttribute('x2', x0 + tickLen);
        }
        tick.setAttribute('y1', y); tick.setAttribute('y2', y);
        tick.setAttribute('stroke', cc.color);
        tick.setAttribute('stroke-width','1.5');
        tick.setAttribute('opacity','0.7');
        svg.appendChild(tick);
      });

      // Label at midpoint
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      const labelX = side === 'left' ? depth - 4 : depth + 4;
      txt.setAttribute('x', labelX);
      txt.setAttribute('y', midY);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('dominant-baseline','central');
      txt.setAttribute('transform', `rotate(-90, ${labelX}, ${midY})`);
      txt.setAttribute('font-size','9');
      txt.setAttribute('font-family','SF Mono, Fira Code, monospace');
      txt.setAttribute('font-weight','600');
      txt.setAttribute('letter-spacing','0.06em');
      txt.setAttribute('fill', cc.color);
      txt.setAttribute('opacity','0.9');
      txt.textContent = cc.label.toUpperCase();
      svg.appendChild(txt);
    });

    panel.appendChild(svg);
    panel.style.height = totalH + 'px';
  }

  drawSide(leftPanel, leftCCs, 'left');
  drawSide(rightPanel, rightCCs, 'right');
}
</script>
</body>
</html>
